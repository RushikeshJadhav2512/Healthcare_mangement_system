<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CareWell Clinic - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/site.css" rel="stylesheet" />
</head>
<body>
</nav>
<nav class="navbar navbar-expand-lg navbar-dark bg-gradient-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">CareWell</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbars"
      aria-controls="navbars" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbars">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#" data-route="patients">Patients</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-route="appointments">Appointments</a></li>
      </ul>
    </div>
  </div>
</nav>

<header class="hero bg-hero py-5">
  <div class="container text-center text-dark">
    <h1 class="display-5 fw-bold">CareWell Clinic Operations</h1>
    <p class="lead">Manage patients and appointments with a fast, responsive interface.</p>
    <div class="d-flex justify-content-center gap-2">
      <a class="btn btn-light btn-lg" href="#" data-route="patients">Manage Patients</a>
      <a class="btn btn-outline-light btn-lg" href="#" data-route="appointments">View Appointments</a>
    </div>
  </div>
</header>

<main class="container my-5" id="app">
  <!-- Dynamic SPA content injected here -->
</main>

<!-- Schedule Modal -->
<div class="modal fade" id="scheduleModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Schedule Appointment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="schedule-form" novalidate>
          <input type="hidden" name="patientId" id="sch-patientId" />
          <div class="mb-3">
            <label class="form-label">Date & time</label>
            <input class="form-control" id="sch-date" name="date" type="datetime-local" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Doctor</label>
            <input class="form-control" id="sch-doctor" name="doctor" required />
          </div>
          <div class="text-end">
            <button type="submit" class="btn btn-primary">Schedule</button>
          </div>
          <div class="mt-2"><div id="schedule-error" class="form-error"></div></div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
  <div id="toast-container"></div>
</div>

<script src="/js/app.js" type="module"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
